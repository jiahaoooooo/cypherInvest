<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CypherInvest / ARK ETF Structure</title>
  <style>
    :root {
      --paper: #f6f7f4;
      --paper-strong: #ffffff;
      --paper-deep: #f1f3ef;
      --ink: #1b211d;
      --muted: #7b847d;
      --line: rgba(27, 33, 29, 0.08);
      --line-strong: rgba(27, 33, 29, 0.14);
      --accent: #00B7B5;
      --accent-deep: #00B7B5;
      --ticker-strong: #00B7B5;
      --accent-soft: rgba(0, 183, 181, 0.10);
      --panel: #ffffff;
      --panel-strong: #fbfcfa;
      --shadow: 0 1px 2px rgba(27, 33, 29, 0.02), 0 8px 24px rgba(27, 33, 29, 0.04);
      --font-rounded: "Avenir Next Rounded", "SF Pro Rounded", "Nunito", "Helvetica Neue", sans-serif;
      --font-display: "Avenir Next", "Helvetica Neue", sans-serif;
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      color: var(--ink);
      font-family: var(--font-rounded);
      background: var(--paper);
      min-height: 100vh;
      padding: 28px 18px 44px;
    }

    .page {
      max-width: 1160px;
      margin: 0 auto;
    }

    .site-header {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 20px;
      margin-bottom: 22px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-display);
      font-size: clamp(26px, 3.6vw, 36px);
      line-height: 1;
      letter-spacing: -0.04em;
      color: var(--ticker-strong);
      font-weight: 700;
    }

    .eyebrow-sub {
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 600;
      margin-left: 6px;
    }

    .fund-tabs {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 18px;
      margin-bottom: 24px;
      padding-top: 0;
    }

    .fund-tab {
      appearance: none;
      border: 0;
      background: transparent;
      color: var(--muted);
      border-radius: 0;
      padding: 0 0 10px;
      font: inherit;
      font-size: 14px;
      letter-spacing: 0.02em;
      font-weight: 500;
      cursor: pointer;
      position: relative;
      transition: color 220ms ease;
      white-space: nowrap;
    }

    .fund-tab:hover,
    .fund-tab:focus-visible {
      color: var(--ink);
      outline: none;
    }

    .fund-tab::after {
      content: "";
      position: absolute;
      left: 50%;
      top: auto;
      bottom: 0;
      width: 6px;
      height: 6px;
      margin-top: 0;
      margin-left: -3px;
      border-radius: 999px;
      background: var(--accent);
      transform: scale(0);
      transition: transform 220ms ease;
    }

    .fund-tab.active {
      color: var(--accent);
      font-weight: 600;
    }

    .fund-tab.active::after {
      transform: scale(1);
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(280px, 320px) minmax(0, 1fr);
      gap: 22px;
      align-items: start;
    }

    .overview-panel,
    .table-panel {
      background: var(--panel);
      border-radius: 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--line);
    }

    .overview-panel {
      padding: 22px 20px;
      position: sticky;
      top: 18px;
    }

    .overview-block + .overview-block {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    .overview-block:first-child {
      margin-top: 0;
      padding-top: 0;
      border-top: 0;
    }

    .overview-block h3 {
      margin: 0 0 8px;
      font-size: 12px;
      line-height: 1.2;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ticker-strong);
    }

    .overview-block p {
      margin: 0;
      color: var(--ink);
      font-size: 13px;
      line-height: 1.65;
    }

    .overview-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 8px;
    }

    .overview-list li {
      color: var(--ink);
      font-size: 13px;
      line-height: 1.4;
      padding-left: 14px;
      position: relative;
    }

    .overview-list li::before {
      content: "";
      width: 5px;
      height: 5px;
      border-radius: 999px;
      background: var(--ink);
      position: absolute;
      left: 0;
      top: 0.52em;
    }

    .overview-placeholder {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .fees-card {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    .fees-card h3 {
      margin: 0 0 10px;
      font-size: 12px;
      line-height: 1.2;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ticker-strong);
    }

    .fees-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 0;
    }

    .fees-table tbody tr:first-child td {
      padding-top: 0;
    }

    .fees-table td {
      padding: 8px 0;
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      line-height: 1.45;
      vertical-align: top;
    }

    .fees-table tbody tr:last-child td {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .fees-label {
      color: var(--ink);
      padding-right: 12px;
    }

    .fees-value {
      color: var(--ink);
      text-align: right;
      white-space: nowrap;
      font-weight: 600;
    }

    .fees-section-row td {
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding-top: 12px;
      padding-bottom: 6px;
      border-bottom: 0;
    }

    .fees-total .fees-label,
    .fees-total .fees-value {
      font-weight: 700;
    }

    .summary-bar {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 16px;
      padding: 0 0 12px;
    }

    .summary-item {
      min-width: 0;
    }

    .summary-item:nth-child(2) {
      text-align: center;
    }

    .summary-item:nth-child(3) {
      text-align: right;
    }

    .summary-item-label {
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .summary-item-value {
      color: var(--ink);
      font-family: var(--font-display);
      font-size: 20px;
      line-height: 1;
      letter-spacing: -0.02em;
      font-weight: 600;
    }

    .summary-item-delta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.1;
      white-space: nowrap;
    }

    .summary-item-delta.positive {
      color: #b64646;
    }

    .summary-item-delta.negative {
      color: #2f8f67;
    }

    .weight-symbol {
      font-size: 0.58em;
      vertical-align: 0.28em;
      margin-left: 1px;
      letter-spacing: 0;
    }

    .table-ticker {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .logo-badge {
      width: 34px;
      height: 34px;
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .logo-badge img {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      border-radius: 10px;
    }

    .logo-fallback {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      border-radius: 10px;
      position: absolute;
      inset: 0;
      color: var(--accent-deep);
      background: rgba(0, 183, 181, 0.10);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .table-ticker .logo-badge {
      width: 34px;
      height: 34px;
    }

    .table-ticker .logo-badge img,
    .table-ticker .logo-fallback {
      border-radius: 10px;
    }

    .table-ticker .logo-fallback {
      font-size: 11px;
    }

    .table-panel {
      padding: 22px 22px 18px;
    }

    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .mobile-holdings {
      display: none;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 680px;
      background: transparent;
    }

    thead th {
      text-align: left;
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 0 0 10px;
      border-bottom: 1px solid var(--line-strong);
      font-weight: 600;
    }

    tbody td {
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
      vertical-align: middle;
    }

    tbody tr {
      transition: background-color 220ms ease;
    }

    tbody tr:hover {
      background: rgba(0, 183, 181, 0.03);
    }

    .col-rank {
      width: 54px;
      color: var(--muted);
    }

    .col-weight {
      width: 78px;
      text-align: left;
    }

    .col-visual {
      width: 88px;
      text-align: left;
    }

    .col-shares {
      width: 110px;
      text-align: right;
    }

    .col-value {
      width: 132px;
      text-align: right;
    }

    .metric-cell {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .metric-main {
      color: var(--ink);
      line-height: 1.15;
      white-space: nowrap;
    }

    .metric-delta {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.1;
      white-space: nowrap;
    }

    .metric-delta:empty,
    .summary-item-delta:empty,
    .mobile-holding-field-delta:empty {
      display: none;
    }

    .metric-delta.positive {
      color: #b64646;
    }

    .metric-delta.negative {
      color: #2f8f67;
    }

    .weight-track {
      width: 72px;
      height: 8px;
      border-radius: 999px;
      background: rgba(0, 183, 181, 0.10);
      overflow: hidden;
    }

    .weight-fill {
      height: 100%;
      border-radius: inherit;
      background: #00B7B5;
    }

    .ticker-cell {
      min-width: 0;
    }

    .ticker-stack {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .ticker-symbol {
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--ticker-strong);
      line-height: 1.1;
    }

    .ticker-company {
      color: var(--muted);
      line-height: 1.35;
      font-size: 12px;
      letter-spacing: 0;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .page-note {
      margin-top: 14px;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      line-height: 1.6;
    }

    .mobile-holdings-list {
      display: grid;
      gap: 12px;
    }

    .mobile-holding-card {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel-strong);
    }

    .mobile-holding-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .mobile-holding-meta {
      min-width: 0;
      flex: 1;
    }

    .mobile-holding-rank {
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .mobile-holding-ticker {
      color: var(--ticker-strong);
      font-size: 15px;
      letter-spacing: 0.04em;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 2px;
    }

    .mobile-holding-company {
      color: var(--ink);
      font-size: 13px;
      line-height: 1.35;
    }

    .mobile-holding-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
    }

    .mobile-holding-field-label {
      color: var(--muted);
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .mobile-holding-field-value {
      color: var(--ink);
      font-size: 12px;
      font-weight: 600;
      line-height: 1.2;
    }

    .mobile-holding-field-delta {
      color: var(--muted);
      font-size: 10px;
      line-height: 1.2;
      margin-top: 4px;
    }

    .mobile-holding-field-delta.positive {
      color: #b64646;
    }

    .mobile-holding-field-delta.negative {
      color: #2f8f67;
    }

    .mobile-holding-visual {
      margin-top: 10px;
    }

    .mobile-holding-visual .mobile-holding-field-label {
      margin-bottom: 6px;
    }

    @media (max-width: 780px) {
      body {
        padding: 18px 12px 32px;
      }

      .site-header {
        align-items: start;
      }

      .fund-tabs {
        flex-wrap: nowrap;
        justify-content: flex-start;
        align-items: center;
        gap: 16px;
        margin-bottom: 26px;
        overflow-x: auto;
        overflow-y: hidden;
        padding-bottom: 12px;
        scrollbar-width: thin;
      }

      .fund-tabs::-webkit-scrollbar {
        height: 6px;
      }

      .fund-tabs::-webkit-scrollbar-thumb {
        background: rgba(27, 33, 29, 0.14);
        border-radius: 999px;
      }

      .content-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .overview-panel,
      .table-panel {
        padding-left: 18px;
        padding-right: 18px;
        border-radius: 16px;
      }

      .overview-panel {
        position: static;
        top: auto;
      }

      .fund-tab {
        padding: 0 0 10px;
        font-size: 14px;
      }

      .fund-tab::after {
        left: 50%;
        top: auto;
        bottom: 0;
        margin-top: 0;
        margin-left: -3px;
      }

      .table-wrap {
        display: none;
      }

      .mobile-holdings {
        display: block;
      }

      .summary-bar {
        grid-template-columns: 1fr;
        gap: 10px;
        padding: 12px 14px;
      }

      .summary-item-value {
        font-size: 18px;
      }

      .logo-badge {
        width: 28px;
        height: 28px;
      }

      .logo-badge img,
      .logo-fallback {
        border-radius: 8px;
      }

      .logo-fallback {
        font-size: 10px;
      }

      .page-note {
        font-size: 10px;
      }

      .eyebrow {
        gap: 8px;
        font-size: 24px;
      }

      .eyebrow-sub {
        display: none;
      }
    }
  </style>
</head>

            heading: "重点方向",
            items: [
              "健康科技",
              "通信",
              "技术服务",
              "电子科技",
              "消费者服务",
              "生产制造",
            ],
          },
        ],
      },
    };
    let fullHoldingsByFund = {};

    const tabs = document.getElementById("fund-tabs");
    const overviewPanel = document.getElementById("overview-panel");
    const summaryBar = document.getElementById("summary-bar");
    const tableBody = document.getElementById("holdings-table-body");
    const mobileHoldingsList = document.getElementById("mobile-holdings-list");
    const pageNoteNode = document.getElementById("page-note");
    const brandfetchClientId = "1idQJr-Ms3Lzg65ngwr";
    let fundSummaries = {};
    let snapshotDate = "";
    let previousSnapshotDate = "";

    function formatShares(value) {
      return new Intl.NumberFormat("en-US").format(value);
    }

    function formatMarketValue(value) {
      if (value >= 1e9) {
        return `$${(value / 1e9).toFixed(2)}B`;
      }
      if (value >= 1e6) {
        return `$${(value / 1e6).toFixed(2)}M`;
      }
      return `$${new Intl.NumberFormat("en-US").format(Math.round(value))}`;
    }

    function formatLargeNumber(value) {
      if (value >= 1e9) {
        return `${(value / 1e9).toFixed(2)}B`;
      }
      if (value >= 1e6) {
        return `${(value / 1e6).toFixed(2)}M`;
      }
      return new Intl.NumberFormat("en-US").format(Math.round(value));
    }

    function formatWeight(value) {
      return `${value.toFixed(2)}<span class="weight-symbol">%</span>`;
    }

    function formatDeltaNumber(value) {
      return new Intl.NumberFormat("en-US").format(Math.abs(Math.round(value)));
    }

    function formatDeltaValue(value, formatter) {
      if (value === null || value === undefined) {
        return {
          className: "",
          text: "--",
        };
      }

      if (value === 0) {
        return {
          className: "",
          text: "",
        };
      }

      const className = value > 0 ? "positive" : "negative";
      return {
        className,
        text: `${value > 0 ? "+" : "-"}${formatter(Math.abs(value))}`,
      };
    }

    function formatWeightDelta(value) {
      return formatDeltaValue(
        value,
        (absoluteValue) => `${absoluteValue.toFixed(2)}%`,
      );
    }

    function formatSharesDelta(value) {
      return formatDeltaValue(value, formatDeltaNumber);
    }

    function formatMarketValueDelta(value) {
      return formatDeltaValue(value, (absoluteValue) => formatMarketValue(absoluteValue));
    }

    function renderMetricCell(mainHtml, delta) {
      return `
        <div class="metric-cell">
          <div class="metric-main">${mainHtml}</div>
          <div class="metric-delta ${delta.className}">${delta.text}</div>
        </div>
      `;
    }

    function renderWeightBar(value, maxValue) {
      const ratio = maxValue > 0 ? (value / maxValue) * 100 : 0;
      return `
        <div class="weight-track" aria-hidden="true">
          <div class="weight-fill" style="width:${Math.max(0, Math.min(ratio, 100))}%;"></div>
        </div>
      `;
    }

    function getTickerLabel(ticker) {
      return ticker && ticker.trim() ? ticker : "CASH";
    }

    function getTickerInitials(ticker) {
      const cleaned = getTickerLabel(ticker).replace(/[^A-Za-z0-9]/g, "");
      return (cleaned.slice(0, 2) || "CF").toUpperCase();
    }

    function buildLogoUrl(ticker) {
      if (!ticker || !ticker.trim()) {
        return null;
      }
      return `https://cdn.brandfetch.io/ticker/${encodeURIComponent(ticker.trim())}?c=${encodeURIComponent(brandfetchClientId)}`;
    }

    function renderLogo(ticker) {
      const logoUrl = buildLogoUrl(ticker);
      const initials = getTickerInitials(ticker);
      if (!logoUrl) {
        return `<span class="logo-badge"><span class="logo-fallback">${initials}</span></span>`;
      }
      return `
        <span class="logo-badge">
          <span class="logo-fallback">${initials}</span>
          <img src="${logoUrl}" alt="${getTickerLabel(ticker)} logo" loading="lazy" onerror="this.remove();">
        </span>
      `;
    }

    function renderTabs(activeCode) {
      tabs.innerHTML = etfs.map((fund) => `
        <button class="fund-tab ${fund.code === activeCode ? "active" : ""}" type="button" data-fund="${fund.code}">
          ${fund.code}
        </button>
      `).join("");
    }

    function renderSummaryBar(fundCode, holdings) {
      const summary = fundSummaries[fundCode];
      const totalShares = summary?.total_shares ?? holdings.reduce(
        (sum, holding) => sum + Number(holding.shares || 0),
        0,
      );
      const totalMarketValue = summary?.total_market_value ?? holdings.reduce(
        (sum, holding) => sum + Number(holding.marketValue ?? holding.market_value ?? 0),
        0,
      );
      const holdingsCount = summary?.holdings_count ?? holdings.length;

      summaryBar.innerHTML = [
        ["持仓数量", String(holdingsCount), formatDeltaValue(summary?.holdings_count_delta ?? null, formatDeltaNumber)],
        ["总市值", formatMarketValue(totalMarketValue), formatMarketValueDelta(summary?.total_market_value_delta ?? null)],
        ["总持股数", formatLargeNumber(totalShares), formatSharesDelta(summary?.total_shares_delta ?? null)],
      ].map(([label, value, delta]) => `
        <div class="summary-item">
          <div class="summary-item-label">${label}</div>
          <div class="summary-item-value">${value}</div>
          <div class="summary-item-delta ${delta.className}">${delta.text}</div>
        </div>
      `).join("");
    }

    function renderOverview(fund) {
      const overview = fundOverviewCopy[fund.code];
      const fees = fundFeesCopy[fund.code];

      if (!overview) {
        overviewPanel.innerHTML = `
          <p class="overview-placeholder">该 ETF 的中文简介待补充。你把文案给我后，我会按这套样式继续补齐。</p>
        `;
        return;
      }

      overviewPanel.innerHTML = `
        ${overview.sections.map((section) => `
          <section class="overview-block">
            <h3>${section.heading}</h3>
            ${section.body ? `<p>${section.body}</p>` : ""}
            ${section.items ? `
              <ul class="overview-list">
                ${section.items.map((item) => `<li>${item}</li>`).join("")}
              </ul>
            ` : ""}
          </section>
        `).join("")}
        ${fees ? `
          <section class="fees-card">
            <h3>${fees.title}</h3>
            <table class="fees-table">
              <tbody>
                ${fees.rows.map((row) => {
                  if (row.section) {
                    return `
                      <tr class="fees-section-row">
                        <td colspan="2">${row.section}</td>
                      </tr>
                    `;
                  }
                  return `
                    <tr class="${row.total ? "fees-total" : ""}">
                      <td class="fees-label">${row.label}</td>
                      <td class="fees-value">${row.value}</td>
                    </tr>
                  `;
                }).join("")}
              </tbody>
            </table>
          </section>
        ` : ""}
      `;
    }

    function renderTable(holdings) {
      const maxWeight = holdings.length > 0
        ? Math.max(...holdings.map((holding) => Number(holding.weight) || 0))
        : 0;
      tableBody.innerHTML = holdings.map((holding) => `
        <tr class="holding-row">
          <td class="col-rank">${holding.rank ?? ""}</td>
          <td class="ticker-cell">
            <div class="table-ticker">
              ${renderLogo(holding.ticker)}
              <div class="ticker-stack">
                <span class="ticker-symbol">${getTickerLabel(holding.ticker)}</span>
                <span class="ticker-company">${holding.company}</span>
              </div>
            </div>
          </td>
          <td class="col-weight">${renderMetricCell(
            formatWeight(holding.weight),
            formatWeightDelta(holding.weightDelta),
          )}</td>
          <td class="col-visual">${renderWeightBar(holding.weight, maxWeight)}</td>
          <td class="col-shares">${renderMetricCell(
            formatShares(holding.shares),
            formatSharesDelta(holding.sharesDelta),
          )}</td>
          <td class="col-value">${renderMetricCell(
            formatMarketValue(holding.marketValue),
            formatMarketValueDelta(holding.marketValueDelta),
          )}</td>
        </tr>
      `).join("");
    }

    function renderMobileHoldings(holdings) {
      const maxWeight = holdings.length > 0
        ? Math.max(...holdings.map((holding) => Number(holding.weight) || 0))
        : 0;
      mobileHoldingsList.innerHTML = holdings.map((holding) => `
        <article class="mobile-holding-card">
          <div class="mobile-holding-top">
            ${renderLogo(holding.ticker)}
            <div class="mobile-holding-meta">
              <div class="mobile-holding-rank">#${holding.rank ?? ""}</div>
              <div class="mobile-holding-ticker">${getTickerLabel(holding.ticker)}</div>
              <div class="mobile-holding-company">${holding.company}</div>
            </div>
          </div>
          <div class="mobile-holding-grid">
            <div>
              <div class="mobile-holding-field-label">Weight</div>
              <div class="mobile-holding-field-value">${formatWeight(holding.weight)}</div>
              <div class="mobile-holding-field-delta ${formatWeightDelta(holding.weightDelta).className}">${formatWeightDelta(holding.weightDelta).text}</div>
            </div>
            <div>
              <div class="mobile-holding-field-label">Shares</div>
              <div class="mobile-holding-field-value">${formatShares(holding.shares)}</div>
              <div class="mobile-holding-field-delta ${formatSharesDelta(holding.sharesDelta).className}">${formatSharesDelta(holding.sharesDelta).text}</div>
            </div>
            <div>
              <div class="mobile-holding-field-label">Value</div>
              <div class="mobile-holding-field-value">${formatMarketValue(holding.marketValue)}</div>
              <div class="mobile-holding-field-delta ${formatMarketValueDelta(holding.marketValueDelta).className}">${formatMarketValueDelta(holding.marketValueDelta).text}</div>
            </div>
          </div>
          <div class="mobile-holding-visual">
            <div class="mobile-holding-field-label">Relative</div>
            ${renderWeightBar(holding.weight, maxWeight)}
          </div>
        </article>
      `).join("");
    }

    function getTableHoldings(fund) {
      const fullHoldings = fullHoldingsByFund[fund.code];
      if (fullHoldings && fullHoldings.length > 0) {
        return fullHoldings.map((holding, index) => ({
          ...holding,
          rank: index + 1,
          marketValue: holding.marketValue ?? holding.market_value,
          weightDelta: holding.weightDelta ?? holding.weight_delta ?? null,
          sharesDelta: holding.sharesDelta ?? holding.shares_delta ?? null,
          marketValueDelta: holding.marketValueDelta ?? holding.market_value_delta ?? null,
        }));
      }
      return fund.holdings;
    }

    function renderPage(activeCode) {
      const fund = etfs.find((item) => item.code === activeCode) || etfs[0];
      const tableHoldings = getTableHoldings(fund);

      renderTabs(fund.code);
      renderOverview(fund);
      renderSummaryBar(fund.code, tableHoldings);
      renderTable(tableHoldings);
      renderMobileHoldings(tableHoldings);
      pageNoteNode.textContent = snapshotDate
        ? (
          previousSnapshotDate
            ? `数据日期 ${snapshotDate} · 较前一交易日（${previousSnapshotDate}）`
            : `数据日期 ${snapshotDate}`
        )
        : "";

      tabs.querySelectorAll("[data-fund]").forEach((button) => {
        button.addEventListener("click", () => renderPage(button.dataset.fund));
      });
    }

    fetch(holdingsSnapshotUrl)
      .then((response) => {
        if (!response.ok) {
          throw new Error(`Failed to load holdings snapshot: ${response.status}`);
        }
        return response.json();
      })
      .then((payload) => {
        const rows = Array.isArray(payload) ? payload : (payload.holdings || []);
        snapshotDate = Array.isArray(payload) ? snapshotDate : (payload.snapshot_date || "");
        previousSnapshotDate = Array.isArray(payload) ? "" : (payload.previous_snapshot_date || "");
        fundSummaries = Array.isArray(payload) ? {} : (payload.fund_summaries || {});

        fullHoldingsByFund = rows.reduce((grouped, row) => {
          const fundRows = grouped[row.fund] || [];
          fundRows.push({
            ticker: row.ticker,
            company: row.company,
            weight: Number(row.weight),
            shares: Number(row.shares),
            marketValue: Number(row.market_value),
            weightDelta: row.weight_delta === null ? null : Number(row.weight_delta),
            sharesDelta: row.shares_delta === null ? null : Number(row.shares_delta),
            marketValueDelta: row.market_value_delta === null ? null : Number(row.market_value_delta),
          });
          grouped[row.fund] = fundRows;
          return grouped;
        }, {});
      })
      .catch(() => {
        fullHoldingsByFund = {};
        snapshotDate = "";
        previousSnapshotDate = "";
      })
      .finally(() => {
        renderPage(defaultFundCode);
      });
  </script>
</body>
</html>
