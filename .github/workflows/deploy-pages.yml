name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Export latest frontend snapshot
        run: python -m backend.export_frontend_snapshot

      - name: Export latest trades snapshot
        run: |
          if [ -f backend/export_trades_snapshot.py ] && find daliy-trade -name '*.xls' -print -quit | grep -q .; then
            python -m backend.export_trades_snapshot
          else
            echo "Skipping trades snapshot export because script or trade .xls data is unavailable."
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
